name: Update API version from CHANGELOG

on:
  push:
    branches:
      - main
      - master
    paths:
      - "CHANGELOG.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-api-version
  cancel-in-progress: true

jobs:
  sync-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from CHANGELOG.md
        id: ver
        run: |
          set -euo pipefail
          # release-please: "## [1.2.3](url) (date)" atau "## [1.2.3] - date"
          # format manual: "## 1.2.3 (date)"
          v=$(awk '
            /^## / {
              if (tolower($0) ~ /^##[[:space:]]+unreleased/) next
              if (match($0, /[0-9]+\.[0-9]+\.[0-9]+/)) {
                print substr($0, RSTART, RLENGTH)
                exit
              }
            }
          ' CHANGELOG.md)
          if [ -z "$v" ]; then
            echo "::error::Tidak menemukan semver di heading ## … pada CHANGELOG.md (contoh: ## 1.2.3 atau ## [1.2.3](…))"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $v"

      - name: Apply version to cmd/api/main.go
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          V="$VERSION"
          sed -i -E "s/const version = \"[^\"]*\"/const version = \"$V\"/" cmd/api/main.go
          sed -i -E 's|(//[[:space:]]*@version[[:space:]]+)[0-9.]+|\1'"$V"'|' cmd/api/main.go

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cmd/api/main.go
          if git diff --cached --quiet; then
            echo "No changes to cmd/api/main.go (already in sync)."
            exit 0
          fi
          git commit -m "chore: sync API version from CHANGELOG (${{ steps.ver.outputs.version }})"
          git push
